name: CI

on:
  push:
    branches: [main, develop, av2]
  pull_request:

jobs:
  build:
    name: lint, typecheck, test e build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependencias
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Analise estatica (typecheck)
        run: npm run typecheck

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
