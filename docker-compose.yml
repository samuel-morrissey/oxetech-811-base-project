services:
  postgres:
    image: postgres:16-alpine
    container_name: oxetech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oxetech
      POSTGRES_PASSWORD: oxetech
      POSTGRES_DB: oxetech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxetech -d oxetech"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: oxetech-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Interface web (http://localhost:8025)

volumes:
  postgres_data:
